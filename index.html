<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alcoholdle</title>
  <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-blue-950 text-white text-center">
  <br><br>
  <h1 class="text-4xl font-bold underline">
    Welcome to Alcoholdle!
  </h1><br>
  <p>Wordle inspired game. Start by guessing a random alcohol.</p>
  <br><br><br><br><br>

  <!-- søgefelt -->  
<div class="alignCenter">
  <div style="display: flex; align-items: center;">
    <input 
      type="text" 
      autocomplete="off"
      id="searchBox" 
      placeholder="Search for alcohol..." 
      style="width: 300px;"
      class="p-2 rounded-lg border border-gray-600 bg-gray-800 focus:outline-none focus:border-blue-500">
    <button onclick="compare()" class="cursor-pointer" style="margin-left: 8px;">Guess</button>
  </div>
  <div id="suggestions" class="dropdownMenu" style="margin: 10px;"></div>
</div>

    <!--Boxes-->
    <div id="infoBox">
      <div style="display: flex; justify-content: center;">
      <div id = "number1" class="boks">Name</div> <div id = "number2" class="boks">Type</div> <div id = "number3" class="boks">Country</div>
      <div id = "number4" class="boks">Vol.%</div> <div id = "number5" class="boks">Liquid Color</div> <div id = "number6" class="boks">Price</div>
      <div id = "number7" class="boks">Served</div> <div id = "number8" class="boks">Bottle Color</div> <div id = "number9" class="boks">Vibe</div>
    </div>
    </div>
<!-- style="display: none; I BOXSKABELON -->
  <div id="gameSpace">
    <div id="boxSkabelon" style="display: none;">
      <div style="display: flex; justify-content: center; flex-wrap: wrap;">
      <div class="answerBox">Name</div> <div class="answerBox">Type</div> <div class="answerBox">Country</div>
      <div class="answerBox">Vol.%</div> <div class="answerBox">Liquid Color</div> <div class="answerBox">Price</div>
      <div class="answerBox">Served</div> <div class="answerBox">Bottle Color</div> <div class="answerBox">Vibe</div>
    </div></div></div>
</body>
</html>

<script src="./app.js"></script>
<link rel="stylesheet" href="./styles.css">
